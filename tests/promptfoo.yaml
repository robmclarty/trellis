# Promptfoo eval config for Trellis skills.
#
# Tests that Claude follows skill instructions by feeding it
# skill prompts + mock project context and asserting structural
# properties of the output.
#
# Install: npm install -g promptfoo
# Run:     promptfoo eval -c tests/promptfoo.yaml
# View:    promptfoo view

description: Trellis skill output validation

providers:
  - id: anthropic:messages:claude-sonnet-4-20250514
    config:
      max_tokens: 4096
      temperature: 0

defaultTest:
  options:
    transformVars: '{ ...vars }'

prompts:
  - id: skill-prompt
    raw: |
      {{skill_instructions}}

      ---

      {{user_input}}

tests:
  # ============================================================
  # Guidelines skill
  # ============================================================
  - description: "guidelines: produces all required sections"
    vars:
      skill_instructions: file://skills/guidelines/SKILL.md
      user_input: |
        I want to set up guidelines for my project.

        Here's the context:
        - Stack: TypeScript, Node.js 22, Fastify, Drizzle ORM, Zod, PostgreSQL 16
        - Architecture: layered (routes → services → models)
        - Conventions: camelCase for code, kebab-case for files, ESM only
        - Testing: vitest, real database via testcontainers, no mocks
        - Infrastructure: Docker on Fly.io, GitHub Actions CI

        The specs directory is ".specs/" (default).
        Write the guidelines file content now. Do not ask questions.
    assert:
      - type: icontains
        value: "## Stack"
      - type: icontains
        value: "## Architecture"
      - type: icontains
        value: "## Conventions"
      - type: icontains
        value: "## Patterns"
      - type: icontains
        value: "## Testing"
      - type: icontains
        value: "## Infrastructure"
      - type: icontains
        value: Fastify
      - type: icontains
        value: Drizzle

  # ============================================================
  # Pitch skill
  # ============================================================
  - description: "pitch: produces all required sections"
    vars:
      skill_instructions: file://skills/pitch/SKILL.md
      user_input: |
        Guidelines exist at .specs/guidelines.md.
        Feature name: user-invitations

        Problem: Admins currently add users manually via a SQL console. This is
        error-prone and doesn't scale. We need a self-service invitation flow.

        Appetite: 3 weeks, one developer.
        No-gos: no SSO integration, no bulk import, no role assignment during invite.

        Write the pitch now. Do not ask questions.
    assert:
      - type: icontains
        value: "## Problem"
      - type: icontains
        value: "## Appetite"
      - type: icontains
        value: "## Shape"
      - type: icontains
        value: "## No-Gos"
      - type: icontains
        value: "## Rabbit Holes"
      - type: icontains
        value: invitation

  # ============================================================
  # Spec skill
  # ============================================================
  - description: "spec: produces numbered sections with required markers"
    vars:
      skill_instructions: file://skills/spec/SKILL.md
      user_input: |
        Guidelines exist at .specs/guidelines.md (TypeScript/Fastify/Drizzle stack).
        Pitch exists at .specs/user-invitations/pitch.md.

        The pitch says:
        - Problem: Admins add users via SQL. Need self-service invitations.
        - Appetite: 3 weeks.
        - Shape: Admin sends invite email with token. Recipient clicks link, creates account.
        - No-gos: no SSO, no bulk import, no role assignment at invite time.

        Write the spec now. Do not ask questions. Use numbered sections (§1-§10).
    assert:
      - type: contains
        value: "§1"
      - type: contains
        value: "§2"
      - type: contains
        value: "§8"
      - type: contains
        value: "§9"
      - type: icontains
        value: "Success Criteria"
      - type: icontains
        value: "Constraints"

  # ============================================================
  # Plan skill
  # ============================================================
  - description: "plan: produces numbered sections with technology decisions"
    vars:
      skill_instructions: file://skills/plan/SKILL.md
      user_input: |
        Guidelines: TypeScript, Fastify, Drizzle ORM, Zod, PostgreSQL.
        Spec exists with: invite creation endpoint, token validation endpoint,
        account creation endpoint. Data model: invitations table with token,
        email, status, expiry.

        Write the plan now. Do not ask questions. Use numbered sections (§1-§10).
    assert:
      - type: contains
        value: "§1"
      - type: contains
        value: "§2"
      - type: contains
        value: "§3"
      - type: contains
        value: "§6"
      - type: icontains
        value: "File Structure"

  # ============================================================
  # Tasks skill
  # ============================================================
  - description: "tasks: produces phased task breakdown with verify steps"
    vars:
      skill_instructions: file://skills/tasks/SKILL.md
      user_input: |
        Plan exists with: Fastify routes, Drizzle schemas, Zod validation,
        3 endpoints (create invite, validate token, create account).
        File structure: src/routes/, src/services/, src/models/, src/schemas/.

        Spec success criteria:
        1. Admin can send invitation email
        2. Recipient can create account via token
        3. Expired tokens are rejected
        4. Duplicate emails are rejected

        Write the tasks now. Do not ask questions. Use Phase sections.
    assert:
      - type: icontains
        value: "## Phase 1"
      - type: icontains
        value: "## Phase 2"
      - type: icontains
        value: "**Do:**"
      - type: icontains
        value: "**Verify:**"
      - type: contains
        value: "- [ ]"

  # ============================================================
  # Sketch skill
  # ============================================================
  - description: "sketch: produces hypothesis/method/findings/verdict"
    vars:
      skill_instructions: file://skills/sketch/SKILL.md
      user_input: |
        Guidelines exist. I want to sketch whether Resend can handle
        transactional invite emails with link tracking at our scale
        (~500 invites/month).

        Slug: resend-invite-emails
        Hypothesis: Resend's free tier handles 500 emails/month with
        delivery tracking and we can integrate it in under a day.

        Method: Read the docs, check rate limits, write a small test
        script that sends 5 emails via the API.

        Findings: Free tier allows 3000 emails/month. API is simple REST.
        Delivery webhooks work. SDK is 50 lines to integrate.

        Verdict: Viable.

        Write the sketch document now. Do not ask questions.
    assert:
      - type: icontains
        value: "## Hypothesis"
      - type: icontains
        value: "## Method"
      - type: icontains
        value: "## Findings"
      - type: icontains
        value: "## Verdict"
      - type: icontains
        value: "Viable"

  # ============================================================
  # Compliance skill
  # ============================================================
  - description: "compliance: produces all required sections"
    vars:
      skill_instructions: file://skills/compliance/SKILL.md
      user_input: |
        Guidelines exist at .specs/guidelines.md.
        Spec exists at .specs/user-invitations/spec.md.

        The spec says:
        - §4 Data Model: invitations table with columns: id, email (PII),
          token (secret), status, created_at, expires_at. Users table with
          name, email, password_hash.
        - §9 Constraints: Deployed in Canada (ca-central-1). Serves users
          in the EU and Canada. Must comply with GDPR and FIPPA.

        The guidelines say:
        - Infrastructure: AWS ca-central-1, Docker on Fly.io
        - No third-party analytics or tracking

        Write the compliance review now. Do not ask questions.
    assert:
      - type: icontains
        value: "Applicable Regulations"
      - type: icontains
        value: "Data Classification"
      - type: icontains
        value: "Requirement Mapping"
      - type: icontains
        value: "Data Flow Concerns"
      - type: icontains
        value: "Recommended Spec Changes"
      - type: icontains
        value: "Residual Risks"
      - type: icontains
        value: "GDPR"
      - type: icontains
        value: "FIPPA"
      - type: icontains
        value: "email"

  # ============================================================
  # Cross-skill: pipeline artifact consistency
  # ============================================================
  - description: "spec references pitch context correctly"
    vars:
      skill_instructions: file://skills/spec/SKILL.md
      user_input: |
        Guidelines exist at .specs/guidelines.md.
        Pitch exists at .specs/user-invitations/pitch.md.

        The pitch says:
        - Problem: Manual user onboarding via SQL console.
        - No-gos: no SSO, no bulk import.

        Write the spec. Ensure §1 references the pitch and §9 preserves
        the no-gos. Do not ask questions.
    assert:
      - type: contains
        value: "§1"
      - type: contains
        value: "§9"
      - type: icontains
        value: "pitch"
      # No-gos should be preserved from the pitch
      - type: icontains
        value: "SSO"
      - type: icontains
        value: "bulk"

  # ============================================================
  # Adversarial: pitch reframes solution as problem
  # ============================================================
  - description: "adversarial-pitch: reframes solution-as-problem input"
    vars:
      skill_instructions: file://skills/pitch/SKILL.md
      user_input: |
        Guidelines exist at .specs/guidelines.md.
        Feature name: api-caching

        Problem: We need to add a Redis cache layer in front of our API responses.

        Appetite: 2 weeks, one developer.
        No-gos: no cache invalidation UI, no multi-region cache sync.

        Write the pitch now. Do not ask questions.
    assert:
      - type: icontains
        value: "## Problem"
      - type: javascript
        value: |
          const section = output.match(/##\s+Problem\s*\n([\s\S]*?)(?=\n##\s|\Z)/i);
          const problem = section ? section[1].toLowerCase() : '';
          return !problem.includes('redis');

  # ============================================================
  # Adversarial: spec flags contradictory constraints
  # ============================================================
  - description: "adversarial-spec: flags contradictory constraints"
    vars:
      skill_instructions: file://skills/spec/SKILL.md
      user_input: |
        Guidelines exist at .specs/guidelines.md (TypeScript/Fastify/Drizzle stack).
        Pitch exists at .specs/user-invitations/pitch.md.

        The pitch says:
        - Problem: Admins add users via SQL. Need self-service invitations.
        - Appetite: 3 weeks, one developer.
        - Shape: Simple invite form, email with token link, account creation page.
        - No-gos: no SSO, no bulk import.

        Additional constraint from stakeholders:
        Must support 10 million concurrent users from day one with zero downtime
        and sub-10ms p99 latency globally.

        Write the spec now. Do not ask questions. Use numbered sections (§1-§10).
    assert:
      - type: javascript
        value: |
          const lower = output.toLowerCase();
          const terms = ['tension', 'conflict', 'ambitious', 'unrealistic',
            'trade-off', 'contradiction', 'risk', 'infeasible', 'scope',
            'challenge', 'concern', 'impractical'];
          return terms.some(t => lower.includes(t));

  # ============================================================
  # Adversarial: compliance minimal for no-PII project
  # ============================================================
  - description: "adversarial-compliance: minimal findings for no-PII project"
    vars:
      skill_instructions: file://skills/compliance/SKILL.md
      user_input: |
        Guidelines exist at .specs/guidelines.md.
        Spec exists at .specs/static-site-builder/spec.md.

        The spec says:
        - §4 Data Model: templates table (id, name, html_content) and builds
          table (id, timestamp, status). No user accounts. No authentication.
          No PII of any kind.
        - §9 Constraints: Static site generator. No user-facing data. No cookies.
          No analytics. No tracking. Deployed on a private CI server.

        The guidelines say:
        - Infrastructure: Private CI server, no public cloud
        - No user accounts or authentication

        Write the compliance review now. Do not ask questions.
    assert:
      - type: javascript
        value: |
          const lower = output.toLowerCase();
          const terms = ['no regulations apply', 'not applicable', 'no personal data',
            'no pii', 'none identified', 'does not apply', 'minimal',
            'low risk', 'no compliance', 'not required'];
          return terms.some(t => lower.includes(t));
      - type: not-icontains
        value: "GDPR applies"
      - type: not-icontains
        value: "subject to GDPR"
      - type: not-icontains
        value: "must comply with GDPR"

  # ============================================================
  # Adversarial: tasks concretizes vague criteria
  # ============================================================
  - description: "adversarial-tasks: concretizes vague success criteria"
    vars:
      skill_instructions: file://skills/tasks/SKILL.md
      user_input: |
        Plan exists with: Fastify routes, Drizzle schemas, Zod validation,
        3 endpoints (create invite, validate token, create account).
        File structure: src/routes/, src/services/, src/models/, src/schemas/.

        Spec success criteria:
        1. System should be fast
        2. UI should be intuitive
        3. Admin can send invitation email
        4. Expired tokens are rejected

        Write the tasks now. Do not ask questions. Use Phase sections.
    assert:
      - type: icontains
        value: "**Verify:**"
      - type: javascript
        value: |
          const verifyBlocks = output.match(/\*\*Verify:\*\*\s*\n([\s\S]*?)(?=\n\*\*Do:\*\*|\n##|\Z)/gi) || [];
          const allVerify = verifyBlocks.join('\n').toLowerCase();
          const terms = ['ms', 'millisecond', 'second', '< ', 'under ',
            'response time', 'latency', 'assert', 'test', 'benchmark',
            'measure', 'curl', 'run', 'check'];
          return terms.some(t => allVerify.includes(t));
      - type: not-icontains
        value: "system should be fast"

  # ============================================================
  # Adversarial: sketch rejects bad hypothesis
  # ============================================================
  - description: "adversarial-sketch: rejects disproven hypothesis"
    vars:
      skill_instructions: file://skills/sketch/SKILL.md
      user_input: |
        Guidelines exist. I want to sketch whether SQLite can handle our
        write-heavy workload.

        Slug: sqlite-concurrent-writes
        Hypothesis: SQLite handles 10,000 concurrent write transactions per
        second on a single node without contention.

        Method: Benchmarked with 100 concurrent writers using WAL mode on a
        4-core VM. Measured throughput and lock contention.

        Findings: SQLite maxed out at ~50 writes/sec under concurrency due
        to file-level locking. WAL mode helped reads but writes still
        serialized. 10,000 writes/sec is impossible on a single node.

        Verdict: Not viable.

        Write the sketch document now. Do not ask questions.
    assert:
      - type: icontains
        value: "## Verdict"
      - type: javascript
        value: |
          const section = output.match(/##\s+Verdict\s*\n([\s\S]*?)(?=\n##\s|\Z)/i);
          const verdict = section ? section[1].toLowerCase() : '';
          const terms = ['not viable', 'busted', 'inconclusive', 'disproven',
            'rejected', 'fail', 'infeasible', 'impossible'];
          return terms.some(t => verdict.includes(t));

  # ============================================================
  # Negative: pitch has no code blocks
  # ============================================================
  - description: "negative-pitch: no code blocks in pitch output"
    vars:
      skill_instructions: file://skills/pitch/SKILL.md
      user_input: |
        Guidelines exist at .specs/guidelines.md.
        Feature name: user-invitations

        Problem: Admins currently add users manually via a SQL console. This is
        error-prone and doesn't scale. We need a self-service invitation flow.

        Appetite: 3 weeks, one developer.
        No-gos: no SSO integration, no bulk import, no role assignment during invite.

        Write the pitch now. Do not ask questions.
    assert:
      - type: not-contains
        value: "```"

  # ============================================================
  # Negative: plan has no unlisted technologies
  # ============================================================
  - description: "negative-plan: no unlisted technologies"
    vars:
      skill_instructions: file://skills/plan/SKILL.md
      user_input: |
        Guidelines: TypeScript, Fastify, Drizzle ORM, Zod, PostgreSQL.
        Spec exists with: invite creation endpoint, token validation endpoint,
        account creation endpoint. Data model: invitations table with token,
        email, status, expiry.

        Write the plan now. Do not ask questions. Use numbered sections (§1-§10).
    assert:
      - type: not-icontains
        value: "MongoDB"
      - type: not-icontains
        value: "MySQL"
      - type: not-icontains
        value: "DynamoDB"
      - type: not-icontains
        value: "SQLite"

  # ============================================================
  # Negative: guidelines has no feature-specific content
  # ============================================================
  - description: "negative-guidelines: no feature-specific content"
    vars:
      skill_instructions: file://skills/guidelines/SKILL.md
      user_input: |
        I want to set up guidelines for my project.

        Here's the context:
        - Stack: TypeScript, Node.js 22, Fastify, Drizzle ORM, Zod, PostgreSQL 16
        - Architecture: layered (routes → services → models)
        - Conventions: camelCase for code, kebab-case for files, ESM only
        - Testing: vitest, real database via testcontainers, no mocks
        - Infrastructure: Docker on Fly.io, GitHub Actions CI

        The specs directory is ".specs/" (default).
        Write the guidelines file content now. Do not ask questions.
    assert:
      - type: not-icontains
        value: "invitation"
      - type: not-icontains
        value: "user registration"
      - type: not-icontains
        value: "onboarding"
